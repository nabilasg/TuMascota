<ion-content class="login-content">
  
  <div class="login-header">
    <h1 class="app-title">
      <span class="title-part-1">Tu</span><span class="title-part-2">Mascota</span>
    </h1>
    <p class="app-slogan">El cuidado de tu mejor amigo, en tus manos</p>
  </div>

  <ion-card class="login-card">
    <ion-card-content>
      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Email</ion-label>
        <ion-input id="login-email" [(ngModel)]="email" type="email" required></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input id="login-password" [(ngModel)]="password" type="password"></ion-input>
      </ion-item>

      <ion-button expand="full" class="login-button ion-margin-top" (click)="login()" type="button">
        Entrar
      </ion-button>

      <ion-button expand="full" fill="clear" class="register-button" routerLink="/registro">
        ¿No tienes cuenta? Regístrate
      </ion-button>
    </ion-card-content>
  </ion-card>

</ion-content>
