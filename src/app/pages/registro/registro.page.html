<ion-content class="register-content">

  <div class="register-header">
    <h1 class="app-title">
      <span class="title-part-1">Tu</span><span class="title-part-2">Mascota</span>
    </h1>
    <p class="app-slogan">Crear una cuenta para empezar</p>
  </div>

  <ion-card class="register-card">
    <ion-card-content>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Nombre</ion-label>
        <ion-input id="reg-nombre" [(ngModel)]="nombre" type="text"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Email</ion-label>
        <ion-input id="reg-email" [(ngModel)]="email" type="email" required></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Teléfono</ion-label>
        <ion-input id="reg-telefono" [(ngModel)]="telefono" type="tel"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Ciudad</ion-label>
        <ion-input id="reg-ciudad" [(ngModel)]="ciudad" type="text"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">País</ion-label>
        <ion-input id="reg-pais" [(ngModel)]="pais" type="text"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input id="reg-password" [(ngModel)]="password" type="password"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-item">
        <ion-label position="floating">Repetir Contraseña</ion-label>
        <ion-input id="reg-password2" [(ngModel)]="passwordConfirm" type="password"></ion-input>
      </ion-item>

      <ion-button expand="full" class="register-button-main ion-margin-top" (click)="register()" type="button">
        Crear Cuenta
      </ion-button>

      <ion-button expand="full" fill="clear" class="login-return" routerLink="/login">
        ¿Ya tienes cuenta? Inicia sesión
      </ion-button>

    </ion-card-content>
  </ion-card>

</ion-content>
